<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyChat — Your own LLM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Variables ─────────────────────────────────────────── */
    :root {
      --bg:        #0d0f14;
      --surface:   #161a24;
      --border:    #262c3d;
      --accent:    #4f8ef7;
      --accent2:   #7c3aed;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --user-bg:   #1e2a45;
      --ai-bg:     #161a24;
      --radius:    12px;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 18px;
      overflow-y: auto;
    }

    #sidebar h1 {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .ctrl { display: flex; flex-direction: column; gap: 5px; }

    select, textarea, input[type="range"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color .2s;
    }
    select:focus, textarea:focus { border-color: var(--accent); }

    textarea { resize: vertical; min-height: 90px; line-height: 1.5; }

    input[type="range"] {
      padding: 4px 0;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .range-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .range-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--accent);
      min-width: 36px;
      text-align: right;
    }

    #clear-btn {
      margin-top: auto;
      padding: 10px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }
    #clear-btn:hover { border-color: #ef4444; color: #ef4444; }

    /* ── Main area ─────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Chat log ──────────────────────────────────────────── */
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-log::-webkit-scrollbar { width: 6px; }
    #chat-log::-webkit-scrollbar-track { background: transparent; }
    #chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      animation: fadeUp .25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
    }
    .avatar.user-av { background: var(--user-bg); border: 1px solid var(--accent); color: var(--accent); }
    .avatar.ai-av   { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2d3f66;
      border-top-right-radius: 4px;
    }
    .msg.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    /* blinking cursor while streaming */
    .cursor::after {
      content: '▊';
      animation: blink .7s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Empty state ───────────────────────────────────────── */
    #empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
    }
    #empty-state .logo {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    #empty-state p { font-size: 14px; }

    /* ── Input bar ─────────────────────────────────────────── */
    #input-area {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    #input-wrap {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px 14px;
      resize: none;
      outline: none;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.5;
      transition: border-color .2s;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      width: 42px;
      height: 42px;
      min-width: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .2s, transform .1s;
    }
    #send-btn:hover { opacity: .85; }
    #send-btn:active { transform: scale(.95); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; fill: white; }

    #status-bar {
      max-width: 820px;
      margin: 6px auto 0;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
      min-height: 16px;
    }
  </style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
<aside id="sidebar">
  <h1>⬡ MyChat</h1>

  <div class="ctrl">
    <div class="section-label">Model</div>
    <select id="model-select">
      <option value="">Loading…</option>
    </select>
  </div>

  <div class="ctrl">
    <div class="section-label">System Prompt</div>
    <textarea id="system-prompt" placeholder="You are a helpful assistant.">You are a helpful assistant.</textarea>
  </div>

  <div class="ctrl">
    <div class="section-label">Temperature</div>
    <div class="range-row">
      <input type="range" id="temperature" min="0" max="1" step="0.05" value="0.7" />
      <span class="range-val" id="temp-val">0.7</span>
    </div>
  </div>

  <div class="ctrl">
    <div class="section-label">Max Tokens</div>
    <div class="range-row">
      <input type="range" id="max-tokens" min="64" max="4096" step="64" value="1024" />
      <span class="range-val" id="tokens-val">1024</span>
    </div>
  </div>

  <div class="ctrl">
    <div class="section-label">Memory</div>
    <div class="range-row" style="gap:6px">
      <input type="range" id="memory-turns" min="1" max="20" step="1" value="10" />
      <span class="range-val" id="memory-val">10</span>
    </div>
    <span style="font-size:11px;color:var(--muted)">保留最近 N 輪對話</span>
  </div>

  <button id="clear-btn">🗑 Clear conversation</button>
</aside>

<!-- ── Main ─────────────────────────────────────────────────────────────── -->
<main id="main">
  <div id="chat-log">
    <div id="empty-state">
      <div class="logo">MyChat</div>
      <p>選好模型與 System Prompt 就可以開始聊天了</p>
    </div>
  </div>

  <div id="input-area">
    <div id="input-wrap">
      <textarea id="user-input" rows="1" placeholder="輸入訊息… (Shift+Enter 換行，Enter 送出)"></textarea>
      <button id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div id="status-bar"></div>
  </div>
</main>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const API_BASE = "http://localhost:8000";   // Change to your deployed URL if needed

// ── State ─────────────────────────────────────────────────────────────────
let history = [];         // { role, content }[]
let isStreaming = false;

// ── DOM refs ──────────────────────────────────────────────────────────────
const chatLog      = document.getElementById("chat-log");
const emptyState   = document.getElementById("empty-state");
const userInput    = document.getElementById("user-input");
const sendBtn      = document.getElementById("send-btn");
const statusBar    = document.getElementById("status-bar");
const modelSelect  = document.getElementById("model-select");
const systemPrompt = document.getElementById("system-prompt");
const tempSlider   = document.getElementById("temperature");
const tempVal      = document.getElementById("temp-val");
const tokensSlider = document.getElementById("max-tokens");
const tokensVal    = document.getElementById("tokens-val");
const memSlider    = document.getElementById("memory-turns");
const memVal       = document.getElementById("memory-val");

// ── Sliders ───────────────────────────────────────────────────────────────
tempSlider.addEventListener("input",   () => tempVal.textContent   = tempSlider.value);
tokensSlider.addEventListener("input", () => tokensVal.textContent = tokensSlider.value);
memSlider.addEventListener("input",    () => memVal.textContent    = memSlider.value);

// ── Load models ───────────────────────────────────────────────────────────
async function loadModels() {
  try {
    const res = await fetch(`${API_BASE}/api/models`);
    const data = await res.json();
    modelSelect.innerHTML = data.models.map(m =>
      `<option value="${m.id}">${m.name}</option>`
    ).join("");
  } catch {
    modelSelect.innerHTML = `<option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>`;
    setStatus("⚠ Cannot reach backend — is it running?");
  }
}
loadModels();

// ── Clear ─────────────────────────────────────────────────────────────────
document.getElementById("clear-btn").addEventListener("click", () => {
  history = [];
  chatLog.innerHTML = "";
  chatLog.appendChild(emptyState);
  emptyState.style.display = "";
  setStatus("");
});

// ── Auto-resize textarea ──────────────────────────────────────────────────
userInput.addEventListener("input", () => {
  userInput.style.height = "auto";
  userInput.style.height = Math.min(userInput.scrollHeight, 200) + "px";
});

// ── Send on Enter (Shift+Enter = newline) ─────────────────────────────────
userInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    if (!isStreaming) sendMessage();
  }
});
sendBtn.addEventListener("click", () => { if (!isStreaming) sendMessage(); });

// ── Helpers ───────────────────────────────────────────────────────────────
function setStatus(msg) { statusBar.textContent = msg; }

function scrollToBottom() {
  chatLog.scrollTop = chatLog.scrollHeight;
}

function appendMessage(role, content = "") {
  emptyState.style.display = "none";

  const div = document.createElement("div");
  div.className = `msg ${role}`;

  const av = document.createElement("div");
  av.className = `avatar ${role === "user" ? "user-av" : "ai-av"}`;
  av.textContent = role === "user" ? "U" : "AI";

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = content;

  div.appendChild(av);
  div.appendChild(bubble);
  chatLog.appendChild(div);
  scrollToBottom();
  return bubble;
}

// ── Main send ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  // Push user message
  history.push({ role: "user", content: text });
  appendMessage("user", text);
  userInput.value = "";
  userInput.style.height = "auto";

  // Trim history to memory window (keep last N turns = N pairs)
  const maxTurns = parseInt(memSlider.value);
  if (history.length > maxTurns * 2) {
    history = history.slice(history.length - maxTurns * 2);
  }

  // AI bubble
  const aiBubble = appendMessage("ai", "");
  aiBubble.classList.add("cursor");

  isStreaming = true;
  sendBtn.disabled = true;
  setStatus("⏳ Thinking…");

  let fullText = "";

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model:         modelSelect.value,
        system_prompt: systemPrompt.value.trim() || "You are a helpful assistant.",
        messages:      history,
        temperature:   parseFloat(tempSlider.value),
        max_tokens:    parseInt(tokensSlider.value),
        stream:        true,
      }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split("\n");
      buffer = lines.pop();           // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const payload = line.slice(6).trim();
        if (payload === "[DONE]") break;
        try {
          const { text } = JSON.parse(payload);
          fullText += text;
          aiBubble.textContent = fullText;
          scrollToBottom();
        } catch {}
      }
    }

    // Push assistant message to history
    history.push({ role: "assistant", content: fullText });
    setStatus(`✓ ${modelSelect.options[modelSelect.selectedIndex]?.text ?? modelSelect.value}  |  記憶：${Math.floor(history.length/2)} 輪`);

  } catch (err) {
    aiBubble.textContent = `❌ Error: ${err.message}`;
    history.pop();   // remove failed user message
    setStatus("Error — check if backend is running.");
  } finally {
    aiBubble.classList.remove("cursor");
    isStreaming = false;
    sendBtn.disabled = false;
  }
}
</script>
</body>
</html>
